<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Font Comparison</title>
  <!-- Google Fonts Import -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Inter&family=Montserrat&family=Nunito&family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      font-size: 24px;
      padding: 40px;
      line-height: 1.6;
      background-color: #f9f9f9;
      color: #333;
    }
    .font-sample {
      margin-bottom: 30px;
    }
    .poppins { font-family: 'Poppins', sans-serif; }
    .inter { font-family: 'Inter', sans-serif; }
    .montserrat { font-family: 'Montserrat', sans-serif; }
    .nunito { font-family: 'Nunito', sans-serif; }
    .roboto { font-family: 'Roboto', sans-serif; }
    h2 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="font-sample poppins">
    <h2>Poppins</h2>
    <p>The quick brown fox jumps over the lazy dog.</p>
  </div>
  <div class="font-sample inter">
    <h2>Inter</h2>
    <p>The quick brown fox jumps over the lazy dog.</p>
  </div>
  <div class="font-sample montserrat">
    <h2>Montserrat</h2>
    <p>The quick brown fox jumps over the lazy dog.</p>
  </div>
  <div class="font-sample nunito">
    <h2>Nunito</h2>
    <p>The quick brown fox jumps over the lazy dog.</p>
  </div>
  <div class="font-sample roboto">
    <h2>Roboto</h2>
    <p>The quick brown fox jumps over the lazy dog.</p>
  </div>
</body>
</html>
